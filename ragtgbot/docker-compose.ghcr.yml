services:
  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  embedding_service:
    image: ghcr.io/korjavin/ragtgbot-embedding-service
    ports:
      - "8000:8000"
    restart: always
    depends_on:
      - redis
      - qdrant

  tgbot1:
    image: ghcr.io/korjavin/ragtgbot-tgbot
    restart: always
    depends_on:
      - redis
      - qdrant
      - embedding_service
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN_1}
      - EMBEDDING_SERVICE_ADDRESS=http://embedding_service:8000/embeddings
      - QDRANT_SERVICE_ADDRESS=http://qdrant:6333
      - TG_GROUP_LIST=${TG_GROUP_LIST}
      - TG_CHANNEL_LIST=${TG_CHANNEL_LIST}
      - VECTOR_SEARCH_LIMIT=${VECTOR_SEARCH_LIMIT:-3}
      - SEARCH_MIN_SCORE=${SEARCH_MIN_SCORE:-0.40}
      - SEARCH_SCORE_GAP=${SEARCH_SCORE_GAP:-0.04}
      - REQUIRE_BOT_MENTION=${REQUIRE_BOT_MENTION:-false}
      - REDIS_ENABLED=${REDIS_ENABLED:-true}
      - REDIS_ADDRESS=${REDIS_ADDRESS:-redis:6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_CONTEXT_TTL_HOURS=${REDIS_CONTEXT_TTL_HOURS:-720}
      - REDIS_KEY_PREFIX=${REDIS_KEY_PREFIX_1:-spb_bot1}
      - DEEP_LINK_SECRET=${DEEP_LINK_SECRET}
      - DEEP_LINK_MAX_AGE_HOURS=${DEEP_LINK_MAX_AGE_HOURS:-720}
      - BOT_OWNER_IDS=${BOT_OWNER_IDS:-1781506158}

